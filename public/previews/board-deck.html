<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#18181b;--slide-text:#F5F5F5;--slide-accent:#a1a1aa;--slide-secondary:rgba(245,245,245,0.55);--slide-dark:#27272a;--slide-accent-light:#d4d4d8;--slide-border:rgba(245,245,245,0.12)}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#18181b;color:#F5F5F5;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px;background:linear-gradient(135deg, #18181b 0%, #27272a 100%)">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:28px">
    <div style="width:8px;height:8px;border-radius:50%;background:var(--slide-accent)"></div>
    <span style="font-size:13px;font-weight:500;color:var(--slide-secondary);letter-spacing:0.04em;text-transform:uppercase">Board Meeting</span>
  </div>
  <h1 style="font-size:54px;font-weight:700;letter-spacing:-0.04em;line-height:1.08;margin:0;color:var(--slide-text)">Board Deck</h1>
  <p style="font-size:20px;color:var(--slide-secondary);margin:18px 0 0;font-weight:400;max-width:560px;line-height:1.5">Financials, strategy, key decisions, and company health</p>
  <div style="width:80px;height:1px;background:var(--slide-accent);margin-top:40px;opacity:0.4"></div>
</div></div></body></html>

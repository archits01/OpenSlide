<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#064e3b;--slide-text:#F5F5F5;--slide-accent:#34d399;--slide-secondary:rgba(245,245,245,0.55);--slide-dark:#065f46;--slide-accent-light:#6ee7b7;--slide-border:rgba(245,245,245,0.12)}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#064e3b;color:#F5F5F5;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px;background:linear-gradient(135deg, #064e3b 0%, #065f46 100%)">
  <div style="font-size:13px;font-weight:600;color:var(--slide-accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:24px">Seed Round</div>
  <h1 style="font-size:54px;font-weight:700;letter-spacing:-0.04em;line-height:1.08;margin:0;color:var(--slide-text)">Early Stage<br/>Fundraise</h1>
  <p style="font-size:20px;color:var(--slide-secondary);margin:20px 0 0;font-weight:400;max-width:580px;line-height:1.5">Vision, traction, product roadmap, and use of funds</p>
  <div style="display:flex;gap:24px;margin-top:44px">
    <div><span style="font-size:32px;font-weight:700;color:var(--slide-accent)">$2M</span><br/><span style="font-size:13px;color:var(--slide-secondary)">Target Raise</span></div>
    <div style="width:1px;background:rgba(255,255,255,0.12)"></div>
    <div><span style="font-size:32px;font-weight:700;color:var(--slide-text)">18mo</span><br/><span style="font-size:13px;color:var(--slide-secondary)">Runway</span></div>
  </div>
</div></div></body></html>

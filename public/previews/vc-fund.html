<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#1a1a2e;--slide-text:#F5F5F5;--slide-accent:#f59e0b;--slide-secondary:rgba(245,245,245,0.55);--slide-dark:#16213e;--slide-accent-light:#fbbf24;--slide-border:rgba(245,245,245,0.12)}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#1a1a2e;color:#F5F5F5;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">

  </div>
  <h1 style="font-size:52px;font-weight:700;letter-spacing:-0.04em;line-height:1.1;margin:0;color:var(--slide-text)">Fund Overview</h1>

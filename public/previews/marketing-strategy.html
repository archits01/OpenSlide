<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#14532d;--slide-text:#F5F5F5;--slide-accent:#86efac;--slide-secondary:rgba(245,245,245,0.55);--slide-dark:#166534;--slide-accent-light:#bbf7d0;--slide-border:rgba(245,245,245,0.12)}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#14532d;color:#F5F5F5;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px;background:linear-gradient(135deg, #14532d 0%, #166534 100%)">
  <div style="width:48px;height:4px;background:var(--slide-accent);border-radius:2px;margin-bottom:28px"></div>
  <h1 style="font-size:54px;font-weight:700;letter-spacing:-0.04em;line-height:1.08;margin:0;color:var(--slide-text)">Marketing<br/>Strategy</h1>
  <p style="font-size:20px;color:var(--slide-secondary);margin:20px 0 0;font-weight:400;max-width:560px;line-height:1.5">Brand, segments, channels, and campaigns</p>
  <div style="display:flex;gap:12px;margin-top:40px">
    <div style="width:10px;height:10px;border-radius:50%;background:var(--slide-accent)"></div>
    <div style="width:10px;height:10px;border-radius:50%;background:var(--slide-accent);opacity:0.5"></div>
    <div style="width:10px;height:10px;border-radius:50%;background:var(--slide-accent);opacity:0.25"></div>
  </div>
</div></div></body></html>

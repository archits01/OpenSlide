<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#1e3a5f;--slide-text:#F5F5F5;--slide-accent:#60a5fa;--slide-secondary:rgba(245,245,245,0.55);--slide-dark:#1e40af;--slide-accent-light:#93c5fd;--slide-border:rgba(245,245,245,0.12)}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#1e3a5f;color:#F5F5F5;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px;background:linear-gradient(135deg, #1e3a5f 0%, #1e40af 100%)">
  <div style="font-size:13px;font-weight:600;color:var(--slide-accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:24px">Quarterly Report</div>
  <h1 style="font-size:54px;font-weight:700;letter-spacing:-0.04em;line-height:1.08;margin:0;color:var(--slide-text)">Q3 Business<br/>Review</h1>
  <div style="display:flex;gap:16px;margin-top:44px">
    <div style="padding:14px 22px;border-radius:12px;background:rgba(96,165,250,0.12);border:1px solid rgba(96,165,250,0.2)">
      <div style="font-size:28px;font-weight:700;color:var(--slide-accent)">$4.2M</div>
      <div style="font-size:12px;color:var(--slide-secondary);margin-top:4px">Revenue</div>
    </div>
    <div style="padding:14px 22px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)">
      <div style="font-size:28px;font-weight:700;color:var(--slide-text)">+23%</div>
      <div style="font-size:12px;color:var(--slide-secondary);margin-top:4px">QoQ Growth</div>
    </div>
    <div style="padding:14px 22px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)">
      <div style="font-size:28px;font-weight:700;color:var(--slide-text)">92%</div>
      <div style="font-size:12px;color:var(--slide-secondary);margin-top:4px">Retention</div>
    </div>
  </div>
</div></div></body></html>

<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#0f0c29;--slide-text:#F5F5F5;--slide-accent:#8b5cf6;--slide-secondary:rgba(245,245,245,0.55);--slide-dark:#302b63;--slide-accent-light:#a78bfa;--slide-border:rgba(245,245,245,0.12)}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#0f0c29;color:#F5F5F5;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px;background:linear-gradient(135deg, #0f0c29 0%, #302b63 60%, #24243e 100%)">
  <div style="width:48px;height:4px;background:var(--slide-accent);border-radius:2px;margin-bottom:32px"></div>
  <h1 style="font-size:56px;font-weight:700;letter-spacing:-0.04em;line-height:1.08;margin:0;color:var(--slide-text)">Startup<br/>Pitch Deck</h1>
  <p style="font-size:22px;color:var(--slide-secondary);margin:20px 0 0;font-weight:400;letter-spacing:-0.01em">Problem. Solution. Market. Traction.</p>
  <div style="display:flex;gap:10px;margin-top:40px">
    <div style="padding:6px 16px;border-radius:20px;background:rgba(139,92,246,0.15);color:var(--slide-accent);font-size:13px;font-weight:500">Series A</div>
    <div style="padding:6px 16px;border-radius:20px;background:rgba(255,255,255,0.06);color:var(--slide-secondary);font-size:13px;font-weight:500">2026</div>
  </div>
</div></div></body></html>

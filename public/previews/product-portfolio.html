<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#FFFFFF;--slide-text:#111111;--slide-accent:#ef4444;--slide-secondary:rgba(17,17,17,0.55);--slide-dark:#0F172A;--slide-accent-light:#818CF8;--slide-border:#E2E8F0}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#FFFFFF;color:#111111;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px;background:#fafaf9">
  <div style="width:40px;height:40px;border-radius:10px;background:var(--slide-accent);display:flex;align-items:center;justify-content:center;margin-bottom:28px">

  </div>

  <p style="font-size:20px;color:var(--slide-secondary);margin:20px 0 0;font-weight:400;max-width:560px;line-height:1.5">Key products, features, impact, and roadmap</p>
  <div style="width:60px;height:3px;background:var(--slide-accent);border-radius:2px;margin-top:40px"></div>
</div></div></body></html>

<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#F8F7F3;--slide-text:#1A1A1A;--slide-accent:#4f46e5;--slide-secondary:rgba(26,26,26,0.55);--slide-dark:#1E293B;--slide-accent-light:#60A5FA;--slide-border:#D5D3CD}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#F8F7F3;color:#1A1A1A;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px;background:#f8f7f4">
  <div style="font-size:13px;font-weight:600;color:var(--slide-accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:24px">Academic Paper</div>
  <h1 style="font-size:50px;font-weight:700;letter-spacing:-0.03em;line-height:1.1;margin:0;color:var(--slide-text)">Research<br/>Report</h1>
  <p style="font-size:19px;color:var(--slide-secondary);margin:20px 0 0;font-weight:400;max-width:560px;line-height:1.6">Methodology, findings, analysis, and conclusions</p>
  <div style="display:flex;align-items:center;gap:16px;margin-top:44px;padding-top:24px;border-top:1px solid var(--slide-border)">
    <div style="width:32px;height:32px;border-radius:50%;background:var(--slide-accent);display:flex;align-items:center;justify-content:center">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </div>
    <div>
      <div style="font-size:13px;font-weight:600;color:var(--slide-text)">Dr. Author Name</div>
      <div style="font-size:12px;color:var(--slide-secondary)">Department of Research</div>
    </div>
  </div>
</div></div></body></html>

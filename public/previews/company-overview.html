<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#292524;--slide-text:#F5F5F5;--slide-accent:#d4b483;--slide-secondary:rgba(245,245,245,0.55);--slide-dark:#44403c;--slide-accent-light:#e8d5b5;--slide-border:rgba(245,245,245,0.12)}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#292524;color:#F5F5F5;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">

  </div>
  <h1 style="font-size:54px;font-weight:700;letter-spacing:-0.04em;line-height:1.08;margin:0;color:var(--slide-text)">Company<br/>Overview</h1>
  <p style="font-size:20px;color:var(--slide-secondary);margin:20px 0 0;font-weight:400;max-width:550px;line-height:1.5">Mission, products, market position, and milestones</p>
</div></div></body></html>

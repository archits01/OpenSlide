<!DOCTYPE html><html><head><meta charset="utf-8"><style>:root{--slide-bg:#1e1b4b;--slide-text:#F5F5F5;--slide-accent:#c4b5fd;--slide-secondary:rgba(245,245,245,0.55);--slide-dark:#312e81;--slide-accent-light:#ddd6fe;--slide-border:rgba(245,245,245,0.12)}html,body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;background:#1e1b4b;color:#F5F5F5;font-family:system-ui,-apple-system,sans-serif}</style></head><body><div style="width:1280px;height:720px;box-sizing:border-box;position:relative;overflow:hidden">
<div style="display:flex;flex-direction:column;justify-content:center;height:100%;padding:80px 90px;background:linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #3730a3 100%)">
  <h1 style="font-size:58px;font-weight:700;letter-spacing:-0.04em;line-height:1.05;margin:0;color:var(--slide-text)">Creative<br/>Portfolio</h1>
  <p style="font-size:20px;color:var(--slide-secondary);margin:20px 0 0;font-weight:400;max-width:520px;line-height:1.5">Selected works, process, and case studies</p>
  <div style="display:flex;gap:8px;margin-top:44px">
    <div style="width:48px;height:48px;border-radius:10px;background:rgba(196,181,253,0.15);border:1px solid rgba(196,181,253,0.25)"></div>
    <div style="width:48px;height:48px;border-radius:10px;background:rgba(196,181,253,0.1);border:1px solid rgba(196,181,253,0.15)"></div>
    <div style="width:48px;height:48px;border-radius:10px;background:rgba(196,181,253,0.06);border:1px solid rgba(196,181,253,0.1)"></div>
  </div>
</div></div></body></html>
